<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>the void</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Georgia', serif;
            color: white;
        }

        #void-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        #content {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
        }

        .void-line {
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            text-align: center;
            opacity: 0;
            transition: opacity 2s ease;
            color: rgba(200, 180, 255, 0.8);
            text-shadow: 0 0 30px rgba(139, 92, 246, 0.5);
            margin: 0.3rem 0;
        }

        .void-line.visible {
            opacity: 1;
        }

        #enter-btn {
            font-family: 'Georgia', serif;
            font-size: 1rem;
            letter-spacing: 0.3em;
            color: rgba(139, 92, 246, 0.7);
            background: transparent;
            border: 1px solid rgba(139, 92, 246, 0.3);
            padding: 0.8rem 2rem;
            cursor: pointer;
            opacity: 0;
            transition: opacity 2s ease, border-color 0.3s ease, color 0.3s ease;
            margin-top: 2rem;
        }

        #enter-btn.visible {
            opacity: 1;
        }

        #enter-btn:hover {
            color: rgba(139, 92, 246, 1);
            border-color: rgba(139, 92, 246, 0.8);
            text-shadow: 0 0 20px rgba(139, 92, 246, 0.8);
        }
    </style>
</head>
<body>

    <canvas id="void-canvas"></canvas>

    <div id="content">
        <div id="text-sequence">
            <p class="void-line" id="line1">welcome.</p>
            <p class="void-line" id="line2">to the void.</p>
            <p class="void-line" id="line3">where thoughts drift forever.</p>
        </div>
        <button id="enter-btn">[ enter ]</button>
    </div>

    <script>
        const canvas = document.getElementById('void-canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        const PARTICLE_COUNT = 120;
        const COLORS = [
            'rgba(88, 28, 135, 0.6)',
            'rgba(109, 40, 217, 0.4)',
            'rgba(30, 27, 75, 0.8)',
            'rgba(55, 48, 163, 0.3)',
            'rgba(15, 10, 40, 0.9)',
            'rgba(139, 92, 246, 0.2)',
            'rgba(17, 24, 39, 0.7)',
        ];

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.4;
                this.speedY = (Math.random() - 0.5) * 0.4;
                this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
                this.opacity = Math.random() * 0.5 + 0.1;
                this.pulse = Math.random() * Math.PI * 2;
                this.pulseSpeed = Math.random() * 0.02 + 0.005;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.pulse += this.pulseSpeed;
                this.opacity = 0.1 + Math.abs(Math.sin(this.pulse)) * 0.4;

                if (this.x < -10) this.x = canvas.width + 10;
                if (this.x > canvas.width + 10) this.x = -10;
                if (this.y < -10) this.y = canvas.height + 10;
                if (this.y > canvas.height + 10) this.y = -10;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        const particles = Array.from({ length: PARTICLE_COUNT }, () => new Particle());

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        animate();

        function revealSequence() {
            const line1 = document.getElementById('line1');
            const line2 = document.getElementById('line2');
            const line3 = document.getElementById('line3');
            const btn   = document.getElementById('enter-btn');

            setTimeout(() => line1.classList.add('visible'), 1000);
            setTimeout(() => line2.classList.add('visible'), 2500);
            setTimeout(() => line3.classList.add('visible'), 4000);
            setTimeout(() => btn.classList.add('visible'),   5500);
        }

        revealSequence();

        document.getElementById('enter-btn').addEventListener('click', () => {
            console.log('entering the void...');
        });
    </script>

</body>
</html>
